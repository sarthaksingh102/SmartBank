<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your SmartBank account and start banking smarter.">
    <title>Register - SmartBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#0ea5e9;--primary-light:#38bdf8;--accent:#10b981;--accent2:#f59e0b;
            --bg-dark:#0a0f1e;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);
            --text-light:#f1f5f9;--text-muted:#94a3b8;--success:#22c55e;--danger:#f87171;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden;padding:20px;}
        .bg-orbs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.3;animation:orbFloat 20s ease-in-out infinite;}
        .orb-1{width:500px;height:500px;background:var(--primary);top:-150px;right:-100px;}
        .orb-2{width:400px;height:400px;background:var(--accent2);bottom:-150px;left:-50px;animation-delay:-7s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-40px) scale(1.1);}}

        .register-wrapper{position:relative;z-index:1;width:100%;max-width:600px;animation:fadeInUp 0.8s ease-out;}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

        .register-card{
            background:rgba(10,15,30,0.8);backdrop-filter:blur(30px);
            border:1px solid var(--glass-border);border-radius:28px;
            padding:44px 40px;position:relative;overflow:hidden;
        }
        .register-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent),var(--accent2));}

        .brand-link{text-decoration:none;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;}
        .brand-link i{font-size:1.5rem;color:var(--primary-light);}
        .brand-link span{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .reg-title{text-align:center;color:var(--text-light);font-size:1.5rem;font-weight:700;margin-bottom:6px;}
        .reg-subtitle{text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:28px;}

        .section-divider{display:flex;align-items:center;gap:12px;margin:24px 0 18px;color:var(--text-muted);font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;}
        .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--glass-border);}

        .form-group{margin-bottom:16px;}
        .form-group label{display:block;color:var(--text-muted);font-size:0.8rem;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
        .form-input{
            width:100%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.08);
            border-radius:12px;padding:12px 14px;color:var(--text-light);
            font-size:0.95rem;font-family:'Inter',sans-serif;transition:all 0.3s;outline:none;
        }
        .form-input:focus{border-color:var(--primary);box-shadow:0 0 16px rgba(99,102,241,0.2);background:rgba(255,255,255,0.08);}
        .form-input::placeholder{color:rgba(148,163,184,0.4);}

        .password-strength{height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin-top:8px;overflow:hidden;}
        .password-strength-bar{height:100%;width:0;border-radius:2px;transition:all 0.4s ease;}
        .strength-text{font-size:0.75rem;margin-top:4px;color:var(--text-muted);}

        .btn-register{
            width:100%;padding:15px;border:none;border-radius:14px;
            background:linear-gradient(135deg,var(--primary),var(--accent));
            color:white;font-size:1rem;font-weight:700;font-family:'Inter',sans-serif;
            cursor:pointer;transition:all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
            margin-top:12px;
        }
        .btn-register:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(99,102,241,0.4);}

        .alert-box{padding:12px 16px;border-radius:12px;margin-bottom:20px;font-size:0.9rem;font-weight:500;display:flex;align-items:center;gap:10px;animation:slideIn 0.4s ease-out;}
        @keyframes slideIn{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
        .alert-danger{background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:var(--danger);}
        .alert-success{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:var(--success);}

        .login-link{text-align:center;margin-top:24px;color:var(--text-muted);font-size:0.95rem;}
        .login-link a{color:var(--primary-light);text-decoration:none;font-weight:600;transition:color 0.3s;}
        .login-link a:hover{color:var(--accent);}

        @media(max-width:576px){.register-card{padding:32px 20px;}}
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div class="register-wrapper">
        <div class="register-card">
            <a th:href="@{/}" class="brand-link">
                <i class="fas fa-shield-halved"></i><span>SmartBank</span>
            </a>
            <h1 class="reg-title">Create Account</h1>
            <p class="reg-subtitle">Start your banking journey in minutes</p>

            <div th:if="${error}" class="alert-box alert-danger">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>
            <div th:if="${success}" class="alert-box alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
            </div>

            <form method="POST" th:action="@{/register}" th:object="${user}" id="registerForm">
                <div class="section-divider"><i class="fas fa-user"></i> Personal Info</div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-input" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-input" placeholder="you@example.com" required>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" th:field="*{password}" class="form-input" placeholder="Min 6 characters" id="regPassword" required>
                            <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                            <div class="strength-text" id="strengthText"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" th:field="*{confirmPassword}" class="form-input" placeholder="Repeat password" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" th:field="*{phoneNumber}" class="form-input" placeholder="+91 98765 43210" required>
                </div>

                <div class="section-divider"><i class="fas fa-map-marker-alt"></i> Address</div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" th:field="*{address}" class="form-input" placeholder="123 Main Street" required>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" th:field="*{city}" class="form-input" placeholder="Mumbai" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>State</label>
                            <input type="text" th:field="*{state}" class="form-input" placeholder="Maharashtra" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Pin Code</label>
                            <input type="text" th:field="*{pinCode}" class="form-input" placeholder="400001" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register" id="regBtn">
                    <span id="regText"><i class="fas fa-user-plus"></i> Create Account</span>
                    <span id="regSpinner" style="display:none"><i class="fas fa-spinner fa-spin"></i> Creating...</span>
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a th:href="@{/login}">Sign in</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password strength meter
        document.getElementById('regPassword').addEventListener('input', function() {
            const val = this.value;
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            const colors = ['#f87171','#fb923c','#facc15','#a3e635','#34d399'];
            const labels = ['Very Weak','Weak','Fair','Good','Strong'];
            const pct = Math.min(strength, 5) * 20;
            bar.style.width = pct + '%';
            bar.style.background = colors[Math.min(strength, 4)];
            text.textContent = val.length > 0 ? labels[Math.min(strength, 4)] : '';
            text.style.color = colors[Math.min(strength, 4)];
        });
        // Loading spinner
        document.getElementById('registerForm').addEventListener('submit', function() {
            document.getElementById('regText').style.display = 'none';
            document.getElementById('regSpinner').style.display = 'inline';
        });
    </script>
</body>
</html>
