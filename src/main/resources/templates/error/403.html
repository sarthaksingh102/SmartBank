<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - SmartBank</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#6366f1;--primary-light:#818cf8;--accent:#a78bfa;--bg-dark:#0f172a;--glass-border:rgba(255,255,255,0.08);--text-light:#e2e8f0;--text-muted:#94a3b8;--danger:#f87171;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
        .bg-orbs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.25;animation:orbFloat 20s ease-in-out infinite;}
        .orb-1{width:500px;height:500px;background:var(--danger);top:-200px;left:-100px;}
        .orb-2{width:400px;height:400px;background:var(--primary);bottom:-200px;right:-100px;animation-delay:-7s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,-40px) scale(1.1);}}
        .error-wrapper{position:relative;z-index:1;text-align:center;max-width:480px;padding:20px;animation:fadeIn 0.8s ease-out;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .error-card{background:rgba(30,27,75,0.6);backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:28px;padding:60px 48px;position:relative;overflow:hidden;}
        .error-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--danger),var(--primary));}
        .error-icon{width:80px;height:80px;border-radius:24px;background:rgba(248,113,113,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2rem;color:var(--danger);animation:shake 0.5s ease-out 0.3s;}
        @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
        .error-code{font-size:5rem;font-weight:900;background:linear-gradient(135deg,var(--danger),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:12px;}
        .error-title{font-size:1.5rem;font-weight:700;color:var(--text-light);margin-bottom:12px;}
        .error-desc{color:var(--text-muted);font-size:1rem;line-height:1.6;margin-bottom:32px;}
        .btn-home{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;padding:14px 32px;border-radius:14px;font-weight:700;font-size:1rem;text-decoration:none;transition:all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);}
        .btn-home:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(99,102,241,0.4);color:white;}
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    <div class="error-wrapper">
        <div class="error-card">
            <div class="error-icon"><i class="fas fa-lock"></i></div>
            <div class="error-code">403</div>
            <h1 class="error-title">Access Denied</h1>
            <p class="error-desc">You don't have permission to access this resource. Please contact your administrator if you believe this is an error.</p>
            <a th:href="@{/dashboard}" class="btn-home"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
