<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your SmartBank account securely.">
    <title>Login - SmartBank</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9; --primary-dark: #0284c7; --primary-light: #38bdf8;
            --accent: #10b981; --accent2: #f59e0b;
            --bg-dark: #0a0f1e; --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --text-light: #f1f5f9; --text-muted: #94a3b8;
            --success: #22c55e; --danger: #f87171;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif; background:var(--bg-dark);
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            position:relative; overflow:hidden;
        }
        .bg-orbs { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; overflow:hidden; }
        .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.35; animation:orbFloat 20s ease-in-out infinite; }
        .orb-1 { width:500px; height:500px; background:var(--primary); top:-150px; left:-100px; }
        .orb-2 { width:400px; height:400px; background:var(--accent2); bottom:-150px; right:-50px; animation-delay:-7s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(30px,-40px) scale(1.1);} }

        .login-wrapper { position:relative; z-index:1; width:100%; max-width:440px; padding:20px; animation:fadeInUp 0.8s ease-out; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

        .login-card {
            background:rgba(10,15,30,0.8); backdrop-filter:blur(30px);
            border:1px solid var(--glass-border); border-radius:28px;
            padding:48px 40px; position:relative; overflow:hidden;
        }
        .login-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:3px;
            background:linear-gradient(90deg, var(--primary), var(--accent), var(--accent2));
        }
        .brand-link { text-decoration:none; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:32px; }
        .brand-link i { font-size:1.6rem; color:var(--primary-light); }
        .brand-link span {
            font-size:1.5rem; font-weight:800;
            background:linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .login-title { text-align:center; color:var(--text-light); font-size:1.6rem; font-weight:700; margin-bottom:8px; }
        .login-subtitle { text-align:center; color:var(--text-muted); font-size:0.95rem; margin-bottom:32px; }

        .form-group { margin-bottom:20px; position:relative; }
        .form-group label { display:block; color:var(--text-muted); font-size:0.85rem; font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
        .input-wrapper { position:relative; }
        .input-wrapper i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:1rem; transition:color 0.3s; }
        .form-input {
            width:100%; background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.08);
            border-radius:14px; padding:14px 16px 14px 44px; color:var(--text-light);
            font-size:1rem; font-family:'Inter',sans-serif; transition:all 0.3s ease; outline:none;
        }
        .form-input:focus { border-color:var(--primary); box-shadow:0 0 20px rgba(99,102,241,0.2); background:rgba(255,255,255,0.08); }
        .form-input:focus + i, .form-input:focus ~ i { color:var(--primary-light); }
        .form-input::placeholder { color:rgba(148,163,184,0.5); }

        .toggle-password { position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; transition:color 0.3s; }
        .toggle-password:hover { color:var(--primary-light); }

        .btn-login {
            width:100%; padding:16px; border:none; border-radius:14px;
            background:linear-gradient(135deg, var(--primary), var(--accent));
            color:white; font-size:1.05rem; font-weight:700; font-family:'Inter',sans-serif;
            cursor:pointer; transition:all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
            position:relative; overflow:hidden; margin-top:8px;
        }
        .btn-login:hover { transform:translateY(-3px); box-shadow:0 15px 40px rgba(99,102,241,0.4); }
        .btn-login:active { transform:translateY(-1px); }

        .alert-box {
            padding:14px 18px; border-radius:14px; margin-bottom:24px;
            font-size:0.9rem; font-weight:500; display:flex; align-items:center; gap:10px;
            animation:slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from{opacity:0;transform:translateX(-20px);} to{opacity:1;transform:translateX(0);} }
        .alert-danger { background:rgba(248,113,113,0.15); border:1px solid rgba(248,113,113,0.3); color:var(--danger); }
        .alert-success { background:rgba(52,211,153,0.15); border:1px solid rgba(52,211,153,0.3); color:var(--success); }

        .register-link {
            text-align:center; margin-top:28px; color:var(--text-muted); font-size:0.95rem;
        }
        .register-link a {
            color:var(--primary-light); text-decoration:none; font-weight:600;
            transition:color 0.3s; position:relative;
        }
        .register-link a::after {
            content:''; position:absolute; bottom:-2px; left:0; width:0; height:2px;
            background:var(--accent); transition:width 0.3s;
        }
        .register-link a:hover { color:var(--accent); }
        .register-link a:hover::after { width:100%; }

        @media(max-width:480px) {
            .login-card { padding:36px 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <a th:href="@{/}" class="brand-link">
                <i class="fas fa-shield-halved"></i>
                <span>SmartBank</span>
            </a>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to access your account</p>

            <div th:if="${param.error}" class="alert-box alert-danger">
                <i class="fas fa-exclamation-circle"></i> Invalid email or password
            </div>
            <div th:if="${param.logout}" class="alert-box alert-success">
                <i class="fas fa-check-circle"></i> You have been logged out successfully
            </div>

            <form method="POST" th:action="@{/login}" id="loginForm">
                <div class="form-group">
                    <label for="emailInput">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" name="username" id="emailInput" class="form-input" placeholder="you@example.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="passwordInput">Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="passwordInput" class="form-input" placeholder="Enter your password" required>
                        <i class="fas fa-lock"></i>
                        <button type="button" class="toggle-password" onclick="togglePassword()" id="toggleBtn">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginText">Sign In</span>
                    <span id="loginSpinner" style="display:none"><i class="fas fa-spinner fa-spin"></i> Signing In...</span>
                </button>
            </form>

            <div class="register-link">
                Don't have an account? <a th:href="@{/register}">Create one</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.querySelector('#toggleBtn i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        document.getElementById('loginForm').addEventListener('submit', function() {
            document.getElementById('loginText').style.display = 'none';
            document.getElementById('loginSpinner').style.display = 'inline';
            document.getElementById('loginBtn').style.opacity = '0.8';
        });
    </script>
</body>
</html>
