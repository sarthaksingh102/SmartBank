<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartBank Dashboard - Manage your accounts and transactions.">
    <title>Dashboard - SmartBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#0ea5e9;--primary-dark:#0284c7;--primary-light:#38bdf8;
            --accent:#10b981;--accent2:#f59e0b;
            --bg-dark:#0a0f1e;--bg-surface:#111827;--bg-card:#151d2e;
            --glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);
            --text-light:#f1f5f9;--text-muted:#94a3b8;
            --success:#22c55e;--danger:#f87171;--warning:#fbbf24;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text-light);overflow-x:hidden;}

        /* SIDEBAR */
        .sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:var(--bg-surface);border-right:1px solid var(--glass-border);padding:24px 16px;display:flex;flex-direction:column;z-index:100;transition:transform 0.3s ease;}
        .sidebar-brand{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:32px;text-decoration:none;}
        .sidebar-brand i{font-size:1.4rem;color:var(--primary-light);}
        .sidebar-brand span{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .sidebar-nav{flex:1;display:flex;flex-direction:column;gap:4px;}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;color:var(--text-muted);text-decoration:none;font-weight:500;font-size:0.95rem;transition:all 0.3s ease;position:relative;}
        .nav-item i{font-size:1.1rem;width:20px;text-align:center;}
        .nav-item:hover{color:var(--text-light);background:rgba(99,102,241,0.1);}
        .nav-item.active{color:white;background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 4px 16px rgba(14,165,233,0.3);}
        .nav-item.active i{color:white;}
        .sidebar-footer{border-top:1px solid var(--glass-border);padding-top:16px;margin-top:auto;}
        .sidebar-user{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--glass);}
        .user-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:white;}
        .user-info{flex:1;min-width:0;}
        .user-name{font-weight:600;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .user-email{font-size:0.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

        /* MAIN */
        .main-content{margin-left:260px;min-height:100vh;padding:32px;}
        .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;}
        .topbar h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;}
        .topbar-actions{display:flex;gap:12px;align-items:center;}
        .btn-logout{background:var(--glass);border:1px solid var(--glass-border);color:var(--text-muted);padding:10px 20px;border-radius:12px;font-weight:500;font-size:0.9rem;text-decoration:none;transition:all 0.3s;font-family:'Inter',sans-serif;}
        .btn-logout:hover{background:rgba(248,113,113,0.12);border-color:rgba(248,113,113,0.3);color:var(--danger);}

        /* TOAST */
        .toast-container{position:fixed;top:24px;right:24px;z-index:9999;}
        .toast-msg{padding:16px 24px;border-radius:16px;font-size:0.9rem;font-weight:500;display:flex;align-items:center;gap:10px;animation:toastIn 0.5s ease-out;margin-bottom:8px;backdrop-filter:blur(20px);}
        .toast-success{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:var(--success);}
        .toast-error{background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:var(--danger);}
        @keyframes toastIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(30px);}}

        /* QUICK ACTIONS */
        .quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px;}
        .quick-action{
            background:var(--bg-card);border:1px solid var(--glass-border);border-radius:20px;
            padding:24px 20px;text-decoration:none;color:var(--text-light);
            transition:all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
            display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;
            position:relative;overflow:hidden;
        }
        .quick-action::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));opacity:0;transition:opacity 0.3s;}
        .quick-action:hover::before{opacity:1;}
        .quick-action:hover{transform:translateY(-6px);border-color:rgba(14,165,233,0.3);box-shadow:0 12px 40px rgba(14,165,233,0.12);color:white;}
        .quick-action .qa-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:transform 0.3s;}
        .quick-action:hover .qa-icon{transform:scale(1.1) rotate(5deg);}
        .qa-transfer .qa-icon{background:rgba(14,165,233,0.15);color:var(--primary-light);}
        .qa-bills .qa-icon{background:rgba(245,158,11,0.15);color:var(--accent2);}
        .qa-qr .qa-icon{background:rgba(16,185,129,0.15);color:var(--accent);}
        .qa-schedule .qa-icon{background:rgba(34,197,94,0.15);color:var(--success);}
        .quick-action p{margin:0;font-weight:600;font-size:0.9rem;}

        /* ACCOUNTS */
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .section-title{font-size:1.2rem;font-weight:700;}
        .account-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
        .account-card{
            background:var(--bg-card);border:1px solid var(--glass-border);border-radius:20px;
            padding:28px;transition:all 0.3s ease;position:relative;overflow:hidden;
        }
        .account-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent),var(--accent2));opacity:0.6;}
        .account-card:hover{border-color:rgba(14,165,233,0.3);box-shadow:0 8px 30px rgba(14,165,233,0.1);transform:translateY(-4px);}
        .account-type-badge{display:inline-flex;padding:4px 12px;border-radius:8px;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;background:rgba(14,165,233,0.15);color:var(--primary-light);margin-bottom:16px;}
        .account-number{font-size:0.9rem;color:var(--text-muted);font-weight:500;margin-bottom:4px;font-family:'Courier New',monospace;letter-spacing:1px;}
        .account-balance{font-size:2rem;font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,#fff,var(--text-muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .btn-view{
            display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;
            background:rgba(14,165,233,0.15);color:var(--primary-light);text-decoration:none;
            font-weight:600;font-size:0.85rem;transition:all 0.3s;border:1px solid transparent;
        }
        .btn-view:hover{background:var(--primary);color:white;transform:translateY(-2px);box-shadow:0 4px 16px rgba(14,165,233,0.3);}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
        .empty-state i{font-size:3rem;margin-bottom:16px;opacity:0.4;}
        .empty-state p{font-size:1rem;}

        /* MOBILE */
        .mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--bg-surface);border:1px solid var(--glass-border);border-radius:12px;padding:10px 14px;color:var(--text-light);font-size:1.2rem;cursor:pointer;}
        .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99;}
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%);}
            .sidebar.open{transform:translateX(0);}
            .sidebar-overlay.open{display:block;}
            .main-content{margin-left:0;}
            .mobile-toggle{display:block;}
            .quick-actions{grid-template-columns:repeat(2,1fr);}
            .account-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
    <!-- Mobile Toggle -->
    <button class="mobile-toggle" onclick="toggleSidebar()" id="mobileToggle"><i class="fas fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <a th:href="@{/}" class="sidebar-brand">
            <i class="fas fa-shield-halved"></i><span>SmartBank</span>
        </a>
        <nav class="sidebar-nav">
            <a th:href="@{/dashboard}" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a th:href="@{/transfer}" class="nav-item"><i class="fas fa-paper-plane"></i> Transfer</a>
            <a th:href="@{/bills}" class="nav-item"><i class="fas fa-receipt"></i> Pay Bills</a>
            <a th:href="@{/qr-payment}" class="nav-item"><i class="fas fa-qrcode"></i> QR Payment</a>
            <a th:href="@{/schedule-transfer}" class="nav-item"><i class="fas fa-calendar-check"></i> Schedule</a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="user-avatar" th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</div>
                <div class="user-info">
                    <div class="user-name" th:text="${user.fullName}">User</div>
                    <div class="user-email" th:text="${user.email}">user@email.com</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="topbar">
            <div>
                <h1>Dashboard</h1>
                <p style="color:var(--text-muted);font-size:0.95rem;">Welcome back, <span th:text="${user.fullName}">User</span> 👋</p>
            </div>
            <div class="topbar-actions">
                <a th:href="@{/logout}" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Toast Messages -->
        <div class="toast-container" id="toastContainer">
            <div th:if="${success}" class="toast-msg toast-success" id="successToast">
                <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
            </div>
            <div th:if="${error}" class="toast-msg toast-error" id="errorToast">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <a th:href="@{/transfer}" class="quick-action qa-transfer">
                <div class="qa-icon"><i class="fas fa-paper-plane"></i></div>
                <p>Transfer</p>
            </a>
            <a th:href="@{/bills}" class="quick-action qa-bills">
                <div class="qa-icon"><i class="fas fa-receipt"></i></div>
                <p>Pay Bills</p>
            </a>
            <a th:href="@{/qr-payment}" class="quick-action qa-qr">
                <div class="qa-icon"><i class="fas fa-qrcode"></i></div>
                <p>QR Payment</p>
            </a>
            <a th:href="@{/schedule-transfer}" class="quick-action qa-schedule">
                <div class="qa-icon"><i class="fas fa-calendar-check"></i></div>
                <p>Schedule</p>
            </a>
        </div>

        <!-- Accounts -->
        <div class="section-header">
            <h2 class="section-title">Your Accounts</h2>
            <span style="color:var(--text-muted);font-size:0.9rem;" th:text="${totalAccounts + ' account(s)'}">0 account(s)</span>
        </div>

        <div th:if="${accounts.isEmpty()}" class="empty-state">
            <i class="fas fa-wallet"></i>
            <p>No accounts found. Please contact support.</p>
        </div>

        <div class="account-grid">
            <div th:each="account : ${accounts}" class="account-card">
                <span class="account-type-badge" th:text="${account.accountType}">SAVINGS</span>
                <div class="account-number" th:text="${account.accountNumber}">SB00000000000000</div>
                <div class="account-balance" th:text="'₹' + ${#numbers.formatDecimal(account.balance, 1, 'COMMA', 2, 'POINT')}">₹0.00</div>
                <a th:href="@{/account/{id}(id=${account.id})}" class="btn-view">
                    View Details <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mobile sidebar toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }
        // Auto-dismiss toasts
        document.querySelectorAll('.toast-msg').forEach(toast => {
            setTimeout(() => {
                toast.style.animation = 'toastOut 0.4s ease-out forwards';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        });
        // Animate balance numbers
        document.querySelectorAll('.account-balance').forEach(el => {
            const text = el.textContent;
            const num = parseFloat(text.replace(/[^0-9.]/g, ''));
            if (isNaN(num)) return;
            const prefix = text.match(/^[^0-9]*/)[0];
            let current = 0;
            const duration = 1200;
            const start = performance.now();
            function animate(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                current = num * eased;
                el.textContent = prefix + current.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                if (progress < 1) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        });
    </script>
</body>
</html>
